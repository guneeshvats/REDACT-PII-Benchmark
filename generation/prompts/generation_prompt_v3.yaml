# -----------------------------------------------------------------------------
# INTEGRATION NOTES (for the SyGra graph_config.yaml that will use this prompt)
# -----------------------------------------------------------------------------
integration:
  call_pattern: |
    Single LLM call (replaces the v2 generate_pii_text + extract_pii_entities
    two-call pattern). Output is parsed as JSON; the `text` field is the
    passage, the `entities` list is fed to the offset aligner.

  offset_alignment: |
    For each entity in the `entities` list, find ALL occurrences of
    entity_string in `text`. Assign offsets by matching mention_index to the
    k-th occurrence (0-indexed). If mention_index ≥ count(occurrences),
    drop the entry and log a warning (this is a model self-consistency
    failure, not an offset bug).

  third_call_decision: |
    Per Issues doc §D.13 — KEEP a verification call ONLY for records where:
      (a) any entity has all_strings_verbatim=false, OR
      (b) target_pattern_present=false, OR
      (c) density_matches_tier=false.
    For the ~85% of records that self-check clean, skip verification.
    Saves ~30% API cost, retains safety net for the 15%.

  diversity_loop: |
    For fixed-axis sweeps (Issues doc §A.1, §E.15), accumulate the last
    N=3 generated `text` fields into prior_passages_summary as 1-sentence
    summaries. After generation, compute embedding cosine vs. each prior
    passage; if max > 0.85 OR ROUGE-L > 0.70, regenerate with a stronger
    diversity instruction injected.

  sampling_strategy: |
    Replace random sampling with a strength-2 covering array over 9 axes
    (NIST ACTS). Target ≈ 1,200 mandatory records to guarantee every
    pairwise (axis_i × axis_j) combination appears at least once.
    Supplement with random samples to hit corpus-size goals and per-entity
    minimum floors (Gaps doc §A2: N_min = 50 instances per type).
